name: Live contract tests
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:e2e --reporter=default --reporter=json --outputFile.json=e2e-report.json
      - if: success()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { owner, repo } = context.repo
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'contract-breakage' })
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'The scheduled run against Google Play is passing again. Closing.'
              })
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              })
            }
      - if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { readFileSync } = require('node:fs')
            const { owner, repo } = context.repo
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            let failures = []
            try {
              const report = JSON.parse(readFileSync('e2e-report.json', 'utf8'))
              failures = report.testResults.flatMap((file) =>
                file.assertionResults
                  .filter((test) => test.status === 'failed')
                  .map((test) => ({
                    feature: file.name.split('/').pop().replace('.e2e.test.ts', ''),
                    fullName: test.fullName,
                    message: (test.failureMessages[0] ?? 'no message').split('\n').slice(0, 6).join('\n'),
                  })),
              )
            } catch {
              failures = [{ feature: 'unknown', fullName: 'report unavailable', message: 'The run failed before vitest produced e2e-report.json. Check the run log.' }]
            }
            const features = [...new Set(failures.map((failure) => failure.feature))].join(', ')
            const title = `Live contract tests failing: ${features}`
            const details = failures
              .map((failure) => `### \`${failure.feature}\` — ${failure.fullName}\n\n\`\`\`\n${failure.message}\n\`\`\``)
              .join('\n\n')
            const body = [
              `The scheduled run against Google Play failed. Latest failing run: ${runUrl}`,
              '',
              `Failing tests (${failures.length}):`,
              '',
              details,
              '',
              'Google likely changed a page structure. Follow [docs/RUNBOOK.md](../blob/main/docs/RUNBOOK.md).',
            ].join('\n')
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'contract-breakage' })
            if (open.data.length === 0) {
              await github.rest.issues.create({ owner, repo, title, labels: ['contract-breakage'], body })
            } else {
              const issue = open.data[0]
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, title, body })
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: `Still failing as of ${new Date().toISOString().slice(0, 10)}: ${runUrl}` })
            }
