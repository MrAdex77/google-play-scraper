name: Live contract tests
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:e2e
      - if: success()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { owner, repo } = context.repo
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'contract-breakage' })
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'The scheduled run against Google Play is passing again. Closing.'
              })
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              })
            }
      - if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { owner, repo } = context.repo
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'contract-breakage' })
            if (open.data.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: 'Live contract tests are failing',
                labels: ['contract-breakage'],
                body: 'The scheduled run against Google Play failed. Google likely changed a page structure. Follow docs/RUNBOOK.md.'
              })
            }
