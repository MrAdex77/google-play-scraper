name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - id: coverage
        run: |
          pct=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          {
            echo '### Coverage (Node ${{ matrix.node }})'
            jq -r '.total | "| Metric | Coverage |", "| --- | --- |", "| Statements | \(.statements.pct)% |", "| Branches | \(.branches.pct)% |", "| Functions | \(.functions.pct)% |", "| Lines | \(.lines.pct)% |"' coverage/coverage-summary.json
          } >> "$GITHUB_STEP_SUMMARY"
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node == 24 && vars.COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: google-play-scraper-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90
      - run: pnpm build
      - run: pnpm check:package
      - run: pnpm docs:api
